name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: swedencentral
  AZURE_RESOURCE_GROUP_NAME: partyplaylist
  AZURE_ENVIRONMENT_NAME: prod
  AZURE_FUNCTIONAPP_NAME: partyplaylist-ew
  DOTNET_VERSION: '10.0.x'
  API_PROJECT_PATH: api/PartyPlaylist.Api.csproj
  PUBLISH_DIR: ./publish

jobs:
  deploy:
    name: Deploy infrastructure and API
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure resources
        uses: azure/cli@v2
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        with:
          inlineScript: |
            az deployment sub create \
              --name partyplaylist-${{ env.AZURE_ENVIRONMENT_NAME }}-${{ github.run_number }} \
              --location "${{ env.AZURE_LOCATION }}" \
              --template-file infra/main.bicep \
              --parameters \
                location="${{ env.AZURE_LOCATION }}" \
                resourceGroupName="${{ env.AZURE_RESOURCE_GROUP_NAME }}" \
                environmentName="${{ env.AZURE_ENVIRONMENT_NAME }}" \
                functionAppName="${{ env.AZURE_FUNCTIONAPP_NAME }}" \
                spotifyClientId="$SPOTIFY_CLIENT_ID" \
                spotifyClientSecret="$SPOTIFY_CLIENT_SECRET" \
                spotifyRedirectUri="https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/auth/callback"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_DIR }} --no-build

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
          sku: flexconsumption
